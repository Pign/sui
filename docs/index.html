<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sui</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --theme-color: #EA8220;
      --theme-color-light: #F5A623;
    }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
    .sidebar { font-family: 'Inter', sans-serif; }
    .sidebar li a { font-size: 14px; }
    .markdown-section h1 { font-weight: 700; }
    .markdown-section h2 { font-weight: 600; border-bottom: 1px solid #eee; padding-bottom: 8px; }
    .markdown-section code { color: #EA8220; }
    .markdown-section pre>code { color: inherit; }
    .app-nav { font-family: 'Inter', sans-serif; }
    .cover-main .anchor span { color: #EA8220; }
    section.cover {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%) !important;
    }
    section.cover .cover-main { color: #e8e8e8; }
    section.cover h1 { color: #fff; font-size: 3rem; }
    section.cover h1 span { color: #EA8220; }
    section.cover blockquote p { color: #F5A623; font-size: 1.2rem; }
    section.cover ul li { color: #ccc; }
    section.cover ul li code { background: rgba(234, 130, 32, 0.15); color: #F5A623; }
    section.cover .cover-main > p:last-of-type a {
      border-radius: 2rem;
      padding: 0.6em 2em;
      font-weight: 600;
    }
    section.cover .cover-main > p:last-of-type a:last-child {
      background: #EA8220 !important;
      color: #fff !important;
      border: none;
    }
    section.cover .cover-main > p:last-of-type a:first-child {
      border: 2px solid rgba(255,255,255,0.3) !important;
      color: #fff !important;
      background: transparent !important;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'sui',
      repo: 'https://github.com/Pign/sui',
      coverpage: true,
      loadSidebar: true,
      subMaxLevel: 3,
      search: {
        placeholder: 'Search docs...',
        noData: 'No results.',
        paths: 'auto'
      },
      auto2top: true,
      routerMode: 'hash',
      markdown: {
        renderer: {
          code: function(code, lang) {
            if (lang === 'mermaid') {
              return '<div class="mermaid">' + code + '</div>';
            }
            return this.origin.code.apply(this, arguments);
          }
        }
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-haxe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-swift.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({ startOnLoad: false, theme: 'default' });
    document.addEventListener('DOMContentLoaded', function() {
      // Re-render mermaid on route change
      var observer = new MutationObserver(function() {
        document.querySelectorAll('.mermaid').forEach(function(el) {
          if (!el.getAttribute('data-processed')) {
            mermaid.run({ nodes: [el] });
          }
        });
      });
      observer.observe(document.getElementById('app'), { childList: true, subtree: true });
    });
  </script>
</body>
</html>
